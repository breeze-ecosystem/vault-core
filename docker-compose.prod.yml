# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║              OVERSIGHT AI — Production Docker Compose                       ║
# ║       Self-contained deployment with PostgreSQL, Redis & Caddy              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# Usage:
#   cp .env.example .env          # then edit .env with your values
#   docker compose -f docker-compose.prod.yml up -d
#
# All sensitive values are sourced from the .env file.
# This compose file includes its own PostgreSQL, Redis, and Caddy reverse proxy
# — no external orchestrator (Coolify, etc.) is required.
#
# Caddy automatically provisions TLS certificates via Let's Encrypt when a
# real domain is configured in DOMAIN.

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: oversight-postgres
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oversight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-oversight}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oversight} -d ${POSTGRES_DB:-oversight}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: oversight-redis
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - redisdata:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ─── API (NestJS) ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: oversight-api
    restart: unless-stopped
    networks:
      - backend
      - frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./secrets/license-private.pem:/app/secrets/license-private.pem:ro
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oversight}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-oversight}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      AI_PREPROCESSOR_URL: http://ai-preprocessor:8000
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-production}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:-false}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-20}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME:-Admin}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME:-}
      COMPANY_NAME: ${COMPANY_NAME:-OVERSIGHT AI}
      LICENSE_PRIVATE_KEY_PATH: /app/secrets/license-private.pem
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  # ─── Dashboard (Next.js) ──────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    container_name: oversight-dashboard
    restart: unless-stopped
    networks:
      - frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-OVERSIGHT AI}
      PORT: 3100
      NODE_ENV: ${NODE_ENV:-production}

  # ─── AI Preprocessor (FastAPI) ────────────────────────────────────────────────
  ai-preprocessor:
    build:
      context: ./services/ai-preprocessor
      dockerfile: Dockerfile
    container_name: oversight-ai-preprocessor
    restart: unless-stopped
    networks:
      - backend
      - frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Caddy (Reverse Proxy + Auto TLS) ─────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: oversight-caddy
    restart: unless-stopped
    networks:
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "caddy validate --config /etc/caddy/Caddyfile || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

# ─── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# ─── Networks ───────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
