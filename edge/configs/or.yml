version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oversight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oversight_edge}
      POSTGRES_DB: ${POSTGRES_DB:-oversight}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-oversight}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_edge}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_edge}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/breeze-ecosystem/oversight-api:latest
    restart: unless-stopped
    ports:
      - '${API_PORT:-4000}:4000'
    env_file: .env
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oversight}:${POSTGRES_PASSWORD:-oversight_edge}@postgres:5432/${POSTGRES_DB:-oversight}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_edge}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      AI_PREPROCESSOR_URL: http://ai-preprocessor:8000
      PORT: 4000
      NODE_ENV: production
      EDGE_TIER: or
      EDGE_CLIENT_ID: ${CLIENT_ID:-default}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    image: ghcr.io/breeze-ecosystem/oversight-dashboard:latest
    restart: unless-stopped
    ports:
      - '${DASHBOARD_PORT:-3100}:3100'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_STREAM_URL: ${NEXT_PUBLIC_STREAM_URL:-}
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-OVERSIGHT AI}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-3100}
    depends_on:
      - api

  ai-preprocessor:
    image: ghcr.io/breeze-ecosystem/oversight-ai-preprocessor:latest
    restart: unless-stopped
    ports:
      - '${AI_PORT:-8000}:8000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      PORT: 8000

  go2rtc:
    image: alexxit/go2rtc:latest
    restart: unless-stopped
    ports:
      - '1984:1984'   # API
      - '8554:8554'   # WebRTC
      - '8888:8888'   # HLS
    volumes:
      - ../go2rtc/go2rtc.yaml:/config/go2rtc.yaml

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}

  edge-agent:
    build:
      context: ../agent
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      EDGE_TIER: or
      EDGE_CLIENT_ID: ${CLIENT_ID:-default}
      SUPERVISION_URL: ${SUPERVISION_URL:-https://supervision.digitsoftafrica.com}
      SUPERVISION_TOKEN: ${SUPERVISION_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - pgdata:/backup/pgdata:ro
    depends_on:
      - api
      - postgres

volumes:
  pgdata:
  redisdata:
