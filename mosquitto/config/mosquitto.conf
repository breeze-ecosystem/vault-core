# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                   Mosquitto MQTT Broker — Production Config                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# This configuration provides:
#   - Listener 1883: localhost-only, no TLS (for internal API)
#   - Listener 8883:  TLS with username/password auth (for edge agents)
#   - Password file: managed via mosquitto_passwd at container init
#   - ACL file:      per-site topic restrictions
#   - Logging:       all messages for debugging

# ─── Listeners ──────────────────────────────────────────────────────────────────
#
# Internal port — localhost only, no TLS (for NestJS API on same host)
listener 1883 localhost

# External port — TLS encrypted, for remote Edge Agents
listener 8883

# ─── TLS / SSL ──────────────────────────────────────────────────────────────────
#
# Self-signed CA and server certificate generated by mosquitto-init container
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key

# Username/password authentication only, no mutual TLS (D-06)
require_certificate false

# ─── Authentication ─────────────────────────────────────────────────────────────
#
# Password file managed via mosquitto_passwd during container startup
# Mounted from the mosquitto-init generated passwd file
password_file /mosquitto/config/passwd

# Access control list — per-site topic restrictions
acl_file /mosquitto/config/acl

# Explicitly disable anonymous access (T-INF-01)
allow_anonymous false

# ─── Logging ────────────────────────────────────────────────────────────────────
#
log_type all
connection_messages true
