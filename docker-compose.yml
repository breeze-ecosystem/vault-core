services:
  # ──────────────────────────────────────────────
  # Application services (using Coolify managed postgres + redis)
  # All secrets come from Coolify environment panel
  # ──────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: oversight-api
    restart: unless-stopped
    ports:
      - 4000:4000
    networks:
      - default
      - coolify
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_HOST: ${REDIS_HOST:?REDIS_HOST is required}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      AI_PREPROCESSOR_URL: http://ai-preprocessor:8000
      PORT: 4000
      NODE_ENV: production
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME:-Admin}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME:-}
      COMPANY_NAME: ${COMPANY_NAME:-OVERSIGHT AI}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    container_name: oversight-dashboard
    restart: unless-stopped
    ports:
      - 3100:3100
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-OVERSIGHT AI}
      PORT: 3100
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  marketing:
    build:
      context: .
      dockerfile: docker/website.Dockerfile
    container_name: oversight-marketing
    restart: unless-stopped
    ports:
      - 3200:3200
    environment:
      PORT: 3200
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-OVERSIGHT AI}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3200/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── Kiosk (Visitor Self-Check-in/out) ───
  kiosk:
    build:
      context: .
      dockerfile: docker/kiosk.Dockerfile
    container_name: oversight-kiosk
    restart: unless-stopped
    ports:
      - "3080:80"
    environment:
      KIOSK_ID: ${KIOSK_ID:-kiosk-01}
      PRINTER_IP: ${PRINTER_IP:?PRINTER_IP is required}
      SITE_ID: ${SITE_ID:?SITE_ID is required}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  ai-preprocessor:
    profiles: ["full"]
    build:
      context: ./services/ai-preprocessor
      dockerfile: Dockerfile
    container_name: oversight-ai-preprocessor
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── MQTT Broker for Door Controller Communication ───

  # Init container: generates self-signed CA + server certificates on first start
  mosquitto-init:
    image: alpine:3
    container_name: oversight-mosquitto-init
    volumes:
      - mosquitto_certs:/certs
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/generate-mqtt-certs.sh"]
    restart: no

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: oversight-mosquitto
    depends_on:
      mosquitto-init:
        condition: service_completed_successfully
    ports:
      - "8883:8883"
    volumes:
      - mosquitto_certs:/mosquitto/certs:ro
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/config/acl:/mosquitto/config/acl:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    environment:
      MOSQUITTO_PASSWORD: ${MOSQUITTO_PASSWORD:-CHANGE_ME_MOSQUITTO_PASSWORD}
    restart: unless-stopped

  # ─── Edge Agent ─────────────────────────────────────────────────────────────────
  edge-agent:
    build:
      context: ./edge/agent
    container_name: oversight-edge-agent
    network_mode: host
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyAMA0:/dev/ttyAMA0
    environment:
      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST:-localhost}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-8883}
      MQTT_USERNAME: ${MQTT_USERNAME:?MQTT_USERNAME is required}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD is required}
      MQTT_TLS_CA_CERT: ${MQTT_TLS_CA_CERT:-/etc/ssl/certs/ca.crt}
      EDGE_SUPERVISION_URL: ${EDGE_SUPERVISION_URL:-http://localhost:4000}
      EDGE_AGENT_SECRET: ${EDGE_AGENT_SECRET:?EDGE_AGENT_SECRET is required}
      EDGE_SITE_ID: ${EDGE_SITE_ID:?EDGE_SITE_ID is required}
      EDGE_AGENT_ID: ${EDGE_AGENT_ID:-edge-unknown}
      SERIAL_PORTS: ${SERIAL_PORTS:-/dev/ttyUSB0,/dev/ttyAMA0}
      SERIAL_BAUD: ${SERIAL_BAUD:-9600}
    restart: unless-stopped

  # ─── Qdrant Vector Database ───

  qdrant:
    image: qdrant/qdrant:latest
    container_name: oversight-qdrant
    restart: unless-stopped
    networks:
      - default
      - coolify
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mosquitto_data:
  mosquitto_log:
  mosquitto_certs:
  qdrant_data:

networks:
  coolify:
    external: true
