services:
  # ──────────────────────────────────────────────
  # Application services (using Coolify managed postgres + redis)
  # ──────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: oversight-api
    restart: unless-stopped
    networks:
      - default
      - coolify
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://postgres:pZS2yJyclzMxL4Aq0dCwF11MfvPZicMoXhYuj1B8yTcTx0ewunSldsb07YtVSONr@dh4wundp5g2ofyek65r9ie7h:5432/postgres
      REDIS_HOST: j11m2r6qksg9pxx5ex80uegh
      REDIS_PORT: 6379
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      AI_PREPROCESSOR_URL: http://ai-preprocessor:8000
      PORT: 4000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-oversight-access-secret-2024}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-oversight-refresh-secret-2024}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    container_name: oversight-dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://oversight-api.digitsoftafrica.com
      PORT: 3100

  ai-preprocessor:
    build:
      context: ./services/ai-preprocessor
      dockerfile: Dockerfile
    container_name: oversight-ai-preprocessor
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  coolify:
    external: true
